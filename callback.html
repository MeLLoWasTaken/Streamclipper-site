<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StreamClipper — TikTok Authorization</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 720px;
         margin: 3rem auto; padding: 0 1.25rem; line-height: 1.65; color: #222; }
  code, #code { background: #f4f4f4; padding: .5rem .75rem; border-radius: 6px;
         display: block; word-break: break-all; margin: 1rem 0; font-size: 1rem; }
  button { padding: .5rem 1rem; border-radius: 6px; border: 1px solid #ccc;
         background: #fff; cursor: pointer; }
  .ok { color: #0a7d34; }
</style>
</head>
<body>
<h1>TikTok authorization received</h1>
<p id="msg">Looking for the authorization code…</p>
<code id="code" hidden></code>
<button id="copy" hidden>Copy code</button>
<p id="hint" hidden>Paste this code into the <code>get_tiktok_token.py</code>
script to finish getting your access token.</p>
<script>
  const p = new URLSearchParams(window.location.search);
  const code = p.get("code");
  const err = p.get("error");
  if (code) {
    document.getElementById("msg").innerHTML =
      "<span class='ok'>Success!</span> Your authorization code is:";
    const el = document.getElementById("code");
    el.textContent = code; el.hidden = false;
    const btn = document.getElementById("copy");
    btn.hidden = false;
    btn.onclick = () => navigator.clipboard.writeText(code)
      .then(() => btn.textContent = "Copied!");
    document.getElementById("hint").hidden = false;
  } else if (err) {
    document.getElementById("msg").textContent =
      "Authorization failed: " + err + " — " + (p.get("error_description") || "");
  } else {
    document.getElementById("msg").textContent =
      "No authorization code found in the URL. Start the flow from get_tiktok_token.py.";
  }
</script>
</body>
</html>
